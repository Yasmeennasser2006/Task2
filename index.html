<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Amazon Product Card</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <a
      href="https://www.amazon.eg/-/en/"
      style="color: rgb(50, 135, 166); padding: 10px"
      >Back to Amazon</a
    >

    <div class="bigdiv">
      <div id="image1">
        <img
          src="https://res.cloudinary.com/dmfbejyv0/image/upload/v1775939033/nike_zb3pyq.jpg"
          alt="Nike Product"
        />
      </div>

      <div class="child1">
        <p style="font-family: Tahoma"><b>Nike Black Running Shoes</b></p>
        <div>
          <img
            src="https://res.cloudinary.com/dmfbejyv0/image/upload/v1775938987/rating-45_ty2jxp.png"
            alt="Rating"
          />
          <span style="color: rgba(64, 144, 255, 0.949); font-family: Tahoma"
            >87</span
          >
          <p
            style="
              color: rgb(30, 146, 12);
              font-family: Tahoma;
              margin-top: 2px;
            "
          >
            $39 - in stock
          </p>
          <p style="font-family: Tahoma">Free delivery tomorrow.</p>
        </div>
      </div>
      <div class="select">
        <select>
          <option>1</option>
          <option>2</option>
          <option>3</option>
        </select>
      </div>

      <div>
        <button class="Add-button Addbuy">Add to Cart</button>
        <button class="Buy-button Addbuy">Buy now</button>
      </div>
    </div>
  </body>
</html>
